name: Security CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run security tests
        run: pytest tests/ -v --tb=short

  static-analysis:
    name: Static Security Analysis (Bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r app/ -ll -f txt
          # -ll = report medium and above severity only

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for CVEs
        run: pip-audit -r requirements.txt

  docker-build:
    name: Docker Build & Lint
    runs-on: ubuntu-latest
    needs: [security-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secure-ai-chatbot:test .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-ai-chatbot:test'
          format: 'table'
          severity: 'HIGH,CRITICAL'
